name: V3 Amazon Data Sync

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      account_id:
        description: Account slug
        required: false
        default: ''
        type: string
      marketplace:
        description: Marketplace code
        required: false
        default: ''
        type: string
      from_date:
        description: Start date YYYY-MM-DD
        required: false
        default: ''
        type: string
      to_date:
        description: End date YYYY-MM-DD
        required: false
        default: ''
        type: string
      sources:
        description: Comma-separated sources
        required: false
        default: all
        type: string
      source_type:
        description: Single source-group type override
        required: false
        default: ''
        type: string
      mode:
        description: Sync mode
        required: false
        default: scheduled
        type: string
      recent_days:
        description: Recent-day window
        required: false
        default: '30'
        type: string
      dry_run:
        description: Skip external pulls
        required: false
        default: false
        type: boolean
      resume_pending:
        description: Resume an existing saved pending request
        required: false
        default: false
        type: boolean

concurrency:
  group: v3-ads-sync-${{ github.repository }}-${{ github.ref_name || 'default' }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AMAZON_ADS_CLIENT_ID: ${{ secrets.AMAZON_ADS_CLIENT_ID }}
      AMAZON_ADS_CLIENT_SECRET: ${{ secrets.AMAZON_ADS_CLIENT_SECRET }}
      AMAZON_ADS_REFRESH_TOKEN: ${{ secrets.AMAZON_ADS_REFRESH_TOKEN }}
      AMAZON_ADS_API_BASE_URL: ${{ secrets.AMAZON_ADS_API_BASE_URL }}
      AMAZON_ADS_PROFILE_ID: ${{ secrets.AMAZON_ADS_PROFILE_ID }}
      ADS_API_REPORT_MAX_ATTEMPTS: '3'
      ADS_API_REPORT_POLL_INTERVAL_MS: '1000'
      ADS_API_MAX_PENDING_AGE_HOURS: '72'
      SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
      SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
      SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
      SP_API_REGION: ${{ secrets.SP_API_REGION }}
      SP_API_MARKETPLACE_ID: ${{ secrets.SP_API_MARKETPLACE_ID }}
      APP_ACCOUNT_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.account_id || secrets.APP_ACCOUNT_ID }}
      APP_MARKETPLACE: ${{ github.event_name == 'workflow_dispatch' && inputs.marketplace || secrets.APP_MARKETPLACE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Print workflow ref diagnostics
        run: |
          echo "Workflow: ${{ github.workflow }}"
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub ref name: ${{ github.ref_name }}"
          echo "GitHub SHA: ${{ github.sha }}"

      - run: npm ci

      - run: npm run build

      - name: Validate required secrets
        run: |
          missing=0
          for name in \
            DATABASE_URL \
            SUPABASE_URL \
            SUPABASE_SERVICE_ROLE_KEY \
            AMAZON_ADS_CLIENT_ID \
            AMAZON_ADS_CLIENT_SECRET \
            AMAZON_ADS_REFRESH_TOKEN \
            AMAZON_ADS_API_BASE_URL \
            AMAZON_ADS_PROFILE_ID \
            SP_API_LWA_CLIENT_ID \
            SP_API_LWA_CLIENT_SECRET \
            SP_API_REFRESH_TOKEN \
            SP_API_REGION \
            SP_API_MARKETPLACE_ID \
            APP_ACCOUNT_ID \
            APP_MARKETPLACE
          do
            eval "value=\${$name}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Resume pending Ads reports
        if: github.event_name != 'workflow_dispatch' || inputs.source_type == ''
        run: >
          npm run v3:resume:amazon --
          --account-id "${APP_ACCOUNT_ID}"
          --marketplace "${APP_MARKETPLACE}"
          --mode scheduled
          --soft-pending-exit

      - name: Run V3 sync
        if: github.event_name != 'workflow_dispatch' || inputs.source_type == ''
        run: >
          npm run v3:pull:amazon --
          --account-id "${APP_ACCOUNT_ID}"
          --marketplace "${APP_MARKETPLACE}"
          --sources "${{ github.event_name == 'workflow_dispatch' && inputs.sources || 'all' }}"
          --mode "${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'scheduled' }}"
          --recent-days "${{ github.event_name == 'workflow_dispatch' && inputs.recent_days || '30' }}"
          --resume-pending
          ${{ github.event_name != 'workflow_dispatch' && '--soft-pending-exit' || '' }}
          ${{ github.event_name == 'workflow_dispatch' && inputs.from_date != '' && format('--from {0}', inputs.from_date) || '' }}
          ${{ github.event_name == 'workflow_dispatch' && inputs.to_date != '' && format('--to {0}', inputs.to_date) || '' }}
          ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '--dry-run' || '' }}

      - name: Run manual source group
        if: github.event_name == 'workflow_dispatch' && inputs.source_type != ''
        env:
          MANUAL_SOURCE_TYPE: ${{ inputs.source_type }}
          FROM_DATE: ${{ inputs.from_date }}
          TO_DATE: ${{ inputs.to_date }}
          RUN_MODE: ${{ inputs.mode }}
          RESUME_PENDING: ${{ inputs.resume_pending }}
        run: |
          if [ -z "$FROM_DATE" ] || [ -z "$TO_DATE" ]; then
            echo "from_date and to_date are required when source_type is set"
            exit 1
          fi

          resume_args=()
          if [ "$RESUME_PENDING" = "true" ]; then
            resume_args+=(--resume-pending)
          fi

          case "$MANUAL_SOURCE_TYPE" in
            ads_api_sp_campaign_daily)
              npm run adsapi:pull-sp-campaign-daily -- --start-date "$FROM_DATE" --end-date "$TO_DATE" "${resume_args[@]}"
              ;;
            ads_api_sp_target_daily)
              npm run adsapi:pull-sp-target-daily -- --start-date "$FROM_DATE" --end-date "$TO_DATE" "${resume_args[@]}"
              ;;
            ads_api_sp_placement_daily)
              npm run adsapi:pull-sp-placement-daily -- --start-date "$FROM_DATE" --end-date "$TO_DATE" "${resume_args[@]}"
              ;;
            ads_api_sp_advertised_product_daily)
              npm run adsapi:pull-sp-advertised-product-daily -- --start-date "$FROM_DATE" --end-date "$TO_DATE" "${resume_args[@]}"
              ;;
            ads_api_sp_search_term_daily)
              npm run adsapi:pull-sp-search-term-daily -- --start-date "$FROM_DATE" --end-date "$TO_DATE" "${resume_args[@]}"
              ;;
            sp_api_sales_traffic_daily)
              npm run v3:pull:amazon -- --account-id "${APP_ACCOUNT_ID}" --marketplace "${APP_MARKETPLACE}" --sources sales --from "$FROM_DATE" --to "$TO_DATE" --mode "${RUN_MODE:-manual}" --resume-pending
              ;;
            sp_api_sqp_weekly)
              npm run v3:sync:sqp -- --account-id "${APP_ACCOUNT_ID}" --marketplace "${APP_MARKETPLACE}" --source weekly --from "$FROM_DATE" --to "$TO_DATE" --mode "${RUN_MODE:-manual}" --resume-pending --soft-unavailable-exit
              ;;
            sp_api_sqp_monthly)
              npm run v3:sync:sqp -- --account-id "${APP_ACCOUNT_ID}" --marketplace "${APP_MARKETPLACE}" --source monthly --from "$FROM_DATE" --to "$TO_DATE" --mode "${RUN_MODE:-manual}" --resume-pending --soft-unavailable-exit
              ;;
            *)
              echo "Unsupported manual source_type: $MANUAL_SOURCE_TYPE"
              exit 1
              ;;
          esac

      - name: Upload out artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3-amazon-data-sync-out
          path: out/
          if-no-files-found: ignore
