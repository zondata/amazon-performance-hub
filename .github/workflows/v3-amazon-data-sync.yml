name: V3 Amazon Data Sync

on:
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      account_id:
        description: Account slug
        required: false
        default: ''
        type: string
      marketplace:
        description: Marketplace code
        required: false
        default: ''
        type: string
      from_date:
        description: Start date YYYY-MM-DD
        required: false
        default: ''
        type: string
      to_date:
        description: End date YYYY-MM-DD
        required: false
        default: ''
        type: string
      sources:
        description: Comma-separated sources
        required: false
        default: all
        type: string
      mode:
        description: Sync mode
        required: false
        default: scheduled
        type: string
      recent_days:
        description: Recent-day window
        required: false
        default: '30'
        type: string
      dry_run:
        description: Skip external pulls
        required: false
        default: false
        type: boolean

concurrency:
  group: v3-ads-sync-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && inputs.account_id || secrets.APP_ACCOUNT_ID }}-${{ github.event_name == 'workflow_dispatch' && inputs.marketplace || secrets.APP_MARKETPLACE }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AMAZON_ADS_CLIENT_ID: ${{ secrets.AMAZON_ADS_CLIENT_ID }}
      AMAZON_ADS_CLIENT_SECRET: ${{ secrets.AMAZON_ADS_CLIENT_SECRET }}
      AMAZON_ADS_REFRESH_TOKEN: ${{ secrets.AMAZON_ADS_REFRESH_TOKEN }}
      AMAZON_ADS_API_BASE_URL: ${{ secrets.AMAZON_ADS_API_BASE_URL }}
      AMAZON_ADS_PROFILE_ID: ${{ secrets.AMAZON_ADS_PROFILE_ID }}
      ADS_API_REPORT_MAX_ATTEMPTS: '240'
      ADS_API_REPORT_POLL_INTERVAL_MS: '5000'
      ADS_API_MAX_PENDING_AGE_HOURS: '72'
      SP_API_LWA_CLIENT_ID: ${{ secrets.SP_API_LWA_CLIENT_ID }}
      SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
      SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
      SP_API_REGION: ${{ secrets.SP_API_REGION }}
      SP_API_MARKETPLACE_ID: ${{ secrets.SP_API_MARKETPLACE_ID }}
      APP_ACCOUNT_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.account_id || secrets.APP_ACCOUNT_ID }}
      APP_MARKETPLACE: ${{ github.event_name == 'workflow_dispatch' && inputs.marketplace || secrets.APP_MARKETPLACE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Validate required secrets
        run: |
          missing=0
          for name in \
            DATABASE_URL \
            SUPABASE_URL \
            SUPABASE_SERVICE_ROLE_KEY \
            AMAZON_ADS_CLIENT_ID \
            AMAZON_ADS_CLIENT_SECRET \
            AMAZON_ADS_REFRESH_TOKEN \
            AMAZON_ADS_API_BASE_URL \
            AMAZON_ADS_PROFILE_ID \
            SP_API_LWA_CLIENT_ID \
            SP_API_LWA_CLIENT_SECRET \
            SP_API_REFRESH_TOKEN \
            SP_API_REGION \
            SP_API_MARKETPLACE_ID \
            APP_ACCOUNT_ID \
            APP_MARKETPLACE
          do
            eval "value=\${$name}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Resume pending Ads reports
        run: >
          npm run v3:resume:amazon --
          --account-id "${APP_ACCOUNT_ID}"
          --marketplace "${APP_MARKETPLACE}"
          --mode scheduled
          --soft-pending-exit

      - name: Run V3 sync
        run: >
          npm run v3:pull:amazon --
          --account-id "${APP_ACCOUNT_ID}"
          --marketplace "${APP_MARKETPLACE}"
          --sources "${{ github.event_name == 'workflow_dispatch' && inputs.sources || 'all' }}"
          --mode "${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'scheduled' }}"
          --recent-days "${{ github.event_name == 'workflow_dispatch' && inputs.recent_days || '30' }}"
          --resume-pending
          ${{ github.event_name == 'workflow_dispatch' && inputs.from_date != '' && format('--from {0}', inputs.from_date) || '' }}
          ${{ github.event_name == 'workflow_dispatch' && inputs.to_date != '' && format('--to {0}', inputs.to_date) || '' }}
          ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '--dry-run' || '' }}

      - name: Upload out artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v3-amazon-data-sync-out
          path: out/
          if-no-files-found: ignore
